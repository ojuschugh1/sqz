<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#4a4a8a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Compression arrows (squeeze visual) -->
  <path d="M 120 200 L 180 256 L 120 312" stroke="url(#accent)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  <path d="M 392 200 L 332 256 L 392 312" stroke="url(#accent)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- SQZ text -->
  <text x="256" y="280" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="120" font-weight="800" fill="#e0e0e0" text-anchor="middle" dominant-baseline="central" letter-spacing="-4">SQZ</text>

  <!-- Tagline -->
  <text x="256" y="380" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="28" fill="#6c63ff" text-anchor="middle" font-weight="500" letter-spacing="6">SQUEEZE</text>
</svg>
