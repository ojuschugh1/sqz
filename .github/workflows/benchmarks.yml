name: Compression Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmarks:
    name: Benchmark gates (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.85"]  # stable + MSRV (indexmap 2.14 requires 1.85)

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.rust }}-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust }}-bench-

      - name: Run benchmark gate tests
        run: cargo test -p sqz-engine benchmarks -- --nocapture
        env:
          RUST_BACKTRACE: 1

      - name: Run full test suite (regression gate)
        run: cargo test --workspace --exclude sqz-wasm
        env:
          RUST_BACKTRACE: 1
