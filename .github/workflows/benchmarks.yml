name: Compression Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmarks:
    name: Run compression benchmark gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Run benchmark gate tests
        run: cargo test -p sqz-engine benchmarks -- --nocapture
        env:
          RUST_BACKTRACE: 1

      - name: Run full test suite (regression gate)
        run: cargo test --workspace
        env:
          RUST_BACKTRACE: 1
