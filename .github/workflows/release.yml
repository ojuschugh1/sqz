# GitHub Actions release workflow.
# Requirement 16.2: GitHub Releases CI workflow.
#
# Triggers on version tags (v*.*.*).
# Builds statically-linked binaries for all 5 supported platforms and
# uploads them as GitHub Release assets.
#
# For each target we ship TWO archives:
#   * sqz-<version>-<target>.{tar.gz,zip}     — the CLI
#   * sqz-mcp-<version>-<target>.{tar.gz,zip} — the MCP server
#
# Both tarballs are flat (single binary at the root, no wrapping
# directory) so that `tar -xzf archive.tar.gz` extracts the binary
# directly into the current working directory. Consumers depend on
# this layout: install.sh, install.ps1, and npm/install.js all assume
# a top-level binary — no `archive/sqz` nesting.
#
# If you add another crate, also add it to the `binaries` list below
# AND to install.sh / install.ps1 / npm/install.js / homebrew/sqz.rb —
# the distribution surfaces are parallel and do not auto-sync.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix ──────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — fully static via musl
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true

          # Linux aarch64 — fully static via musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true

          # macOS x86_64 (cross-compiled on Apple Silicon runner)
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

          # Windows x86_64 — static CRT
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # cross is used for Linux musl targets to avoid needing a local musl
      # toolchain on the GitHub-hosted runner.
      - name: Install cross (Linux musl targets)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package ────────────────────────────────────────────────────────────
      #
      # One flat tarball per binary, no wrapper directory. install.sh,
      # install.ps1 and npm/install.js all depend on this layout — if
      # you change it, update those three too.

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -eu
          TARGET="${{ matrix.target }}"
          VERSION="${GITHUB_REF_NAME}"
          ASSETS=""
          for BINARY in sqz sqz-mcp; do
            ARCHIVE="${BINARY}-${VERSION}-${TARGET}.tar.gz"
            # Stage the binary in the workspace root so the tarball has
            # the binary at its root (no nested directory).
            if [ -f "target/${TARGET}/release/${BINARY}" ]; then
              cp "target/${TARGET}/release/${BINARY}" "${BINARY}"
              tar -czf "${ARCHIVE}" "${BINARY}"
              rm "${BINARY}"
              ASSETS="${ASSETS}${ASSETS:+$'\n'}${ARCHIVE}"
            else
              echo "::warning::Binary ${BINARY} not found for ${TARGET}, skipping"
            fi
          done
          # Space-separated ASSET_LIST is used by the upload step.
          {
            echo "ASSET_LIST<<EOF"
            echo "${ASSETS}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $TARGET = "${{ matrix.target }}"
          $VERSION = "$env:GITHUB_REF_NAME"
          $Assets = @()
          foreach ($BINARY in @("sqz", "sqz-mcp")) {
            $ARCHIVE = "${BINARY}-${VERSION}-${TARGET}.zip"
            $SrcExe = "target\${TARGET}\release\${BINARY}.exe"
            $TmpExe = "${BINARY}.exe"
            if (Test-Path $SrcExe) {
              Copy-Item $SrcExe $TmpExe
              Compress-Archive -Path $TmpExe -DestinationPath $ARCHIVE -Force
              Remove-Item $TmpExe
              $Assets += $ARCHIVE
            } else {
              Write-Warning "Binary ${BINARY}.exe not found for ${TARGET}, skipping"
            }
          }
          # Newline-separated for ASSET_LIST multiline var.
          $AssetList = ($Assets -join "`n")
          "ASSET_LIST<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Append
          $AssetList | Out-File -FilePath $env:GITHUB_ENV -Append
          "EOF" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            sqz-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            sqz-${{ github.ref_name }}-${{ matrix.target }}.zip
            sqz-mcp-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            sqz-mcp-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: ignore

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Update Homebrew formula with real checksums ───────────────────────────
  update-homebrew:
    name: Update Homebrew checksums
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 checksums and update formula
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          FORMULA="homebrew/sqz.rb"

          for target in \
            "aarch64-apple-darwin" \
            "x86_64-apple-darwin" \
            "aarch64-unknown-linux-musl" \
            "x86_64-unknown-linux-musl"; do
            ARCHIVE="artifacts/sqz-${VERSION}-${target}.tar.gz"
            if [ -f "$ARCHIVE" ]; then
              SHA=$(sha256sum "$ARCHIVE" | cut -d' ' -f1)
              PLACEHOLDER="PLACEHOLDER_SHA256_$(echo $target | tr '[:lower:]-' '[:upper:]_')"
              sed -i "s|${PLACEHOLDER}|${SHA}|g" "$FORMULA"
              echo "Updated $target: $SHA"
            fi
          done

          # Also update version in formula
          sed -i "s|version \".*\"|version \"${VERSION#v}\"|g" "$FORMULA"

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/sqz.rb
          git diff --staged --quiet || git commit -m "chore: Update homebrew checksums for ${GITHUB_REF_NAME}"
          git push
