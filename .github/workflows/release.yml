# GitHub Actions release workflow.
# Requirement 16.2: GitHub Releases CI workflow.
#
# Triggers on version tags (v*.*.*).
# Builds statically-linked binaries for all 5 supported platforms and
# uploads them as GitHub Release assets.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix ──────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — fully static via musl
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true

          # Linux aarch64 — fully static via musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true

          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-13
            cross: false

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

          # Windows x86_64 — static CRT
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # cross is used for Linux musl targets to avoid needing a local musl
      # toolchain on the GitHub-hosted runner.
      - name: Install cross (Linux musl targets)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --bin sqz

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} --bin sqz

      # ── Package ────────────────────────────────────────────────────────────

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BINARY="sqz"
          TARGET="${{ matrix.target }}"
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="sqz-${VERSION}-${TARGET}.tar.gz"
          cp "target/${TARGET}/release/${BINARY}" "${BINARY}"
          tar -czf "${ARCHIVE}" "${BINARY}"
          echo "ASSET=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $TARGET = "${{ matrix.target }}"
          $VERSION = "$env:GITHUB_REF_NAME"
          $ARCHIVE = "sqz-${VERSION}-${TARGET}.zip"
          Copy-Item "target\${TARGET}\release\sqz.exe" "sqz.exe"
          Compress-Archive -Path "sqz.exe" -DestinationPath $ARCHIVE
          "ASSET=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
